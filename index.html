<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brown:  #8f5a3a;
      --text-cream:  #e8d5c0;
    }

    html, body {
      height: 100%;
      font-family: 'Belanosima', sans-serif;
    }

    
    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 1.5rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Background image ── */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('bg_blue.jpg');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* ── Title ── */
    .title-block {
      position: absolute;
      top: 35%;
      transform: translateY(-50%);
      text-align: center;
      margin-top: 2.8rem;
    }

    .title-block h1 {
      font-family: 'Belanosima', sans-serif;
      font-size: clamp(2.4rem, 9vw, 4rem);
      font-weight: 600;
      color: var(--text-cream);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }


    /* ── Buttons ── */
    .nav-buttons {
      position: absolute;
      top: 50%;
      transform: translateY(50%);
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 360px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background-color: var(--brown);
      color: var(--text-cream);
      font-family: 'Belanosima', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;

      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

  </style>
</head>
<body>

<main class="page">
  <div class="bg"></div>

  <div class="title-block">
    <h1>Shanna and Ryan Trading Cards</h1>
  </div>

  <nav class="nav-buttons">
    <a href="clues.html" class="nav-btn"><span>Clues</span></a>
    <a href="games.html" class="nav-btn"><span>Games</span></a>
  </nav>
</main>

</body>
</html>
