<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --brown-dark:   #3b2314;
      --brown-mid:    #5c3520;
      --brown-light:  #7a4a2e;
      --brown-hover:  #8f5a3a;
      --text-light:   #f5ede4;
      --text-cream:   #e8d5c0;
    }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 1.5rem 3.5rem;
      position: relative;
      overflow: hidden;
    }

    /* ── Background image ── */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }



    /* ── Title ── */
    .title-block {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 2.8rem;
      animation: fadeUp 0.9s ease both;
    }

    .title-block h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 9vw, 4rem);
      font-weight: 600;
      color: var(--text-cream);
      letter-spacing: 0.04em;
      line-height: 1.1;
    }

    .title-block p {
      margin-top: 0.5rem;
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      font-weight: 300;
      color: rgba(232, 213, 192, 0.75);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── Buttons ── */
    .nav-buttons {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
      max-width: 360px;
      animation: fadeUp 0.9s 0.15s ease both;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 1rem 1.5rem;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(135deg, var(--brown-mid) 0%, var(--brown-dark) 100%);
      color: var(--text-light);
      font-family: 'Jost', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.25s, transform 0.15s, box-shadow 0.25s;

      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--brown-hover) 0%, var(--brown-mid) 100%);
      opacity: 0;
      transition: opacity 0.25s;
      border-radius: inherit;
    }

    .nav-btn:hover::before,
    .nav-btn:focus-visible::before {
      opacity: 1;
    }

    .nav-btn:active {
      transform: scale(0.97);
    }

    .nav-btn span {
      position: relative;
      z-index: 1;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Tablet & up: centre more, slightly larger ── */
    @media (min-width: 600px) {
      .page {
        justify-content: center;
        padding-bottom: 0;
        gap: 3rem;
      }
      .title-block {
        margin-bottom: 0;
      }
      .nav-buttons {
        max-width: 400px;
      }
      .nav-btn {
        padding: 1.1rem 2rem;
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>

<main class="page">
  <div class="bg"></div>

  <div class="title-block">
    <h1>Wedding Cards</h1>
    <p>A game for our guests</p>
  </div>

  <nav class="nav-buttons">
    <a href="clues.html" class="nav-btn"><span>Clues</span></a>
    <a href="games.html" class="nav-btn"><span>Games</span></a>
  </nav>
</main>

</body>
</html>
